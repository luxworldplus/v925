<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUXWORLD AI</title>
    
    <!-- SVG Favicon Updated to AI Logo -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='none'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%2322d3ee' /%3E%3Cstop offset='100%25' style='stop-color:%230284c7' /%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M50 10 L85 30 L85 70 L50 90 L15 70 L15 30 Z' stroke='url(%23g)' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' /%3E%3Cpath d='M40 35 V65 H65' stroke='url(%23g)' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' /%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #E0F2FE; margin: 0; display: flex; width: 100vw; height: 100vh; overflow: hidden; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 4px; }

        /* Sidebar & Resizer */
        .sidebar { width: 280px; background-color: #0d0d0d; border-right: 1px solid #262626; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 40; flex-shrink: 0; position: relative; }
        #resizer { width: 4px; background: transparent; cursor: col-resize; z-index: 50; transition: background 0.2s; flex-shrink: 0; }
        #resizer:hover, #resizer.resizing { background: #0ea5e9; }
        
        .sidebar-item { padding: 0.75rem 1rem; border-radius: 0.5rem; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.25rem; font-size: 0.875rem; color: #d1d5db; }
        .sidebar-item:hover { background-color: #262626; color: white; }
        .sidebar-item.active { background-color: #1a1a1a; color: white; border: 1px solid #404040; }
        
        /* Chat UI */
        .chat-main { flex-grow: 1; display: flex; flex-direction: column; position: relative; width: 100%; min-width: 0; background-color: #050505; height: 100%; }
        .user-msg { background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); color: white; border-radius: 1.25rem 1.25rem 0 1.25rem; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.2); }
        .ai-msg { background-color: #171717; border: 1px solid #262626; color: #e2e8f0; border-radius: 1.25rem 1.25rem 1.25rem 0; overflow-wrap: break-word; user-select: text; cursor: context-menu; }
        .ai-msg img { max-width: 100%; border-radius: 0.75rem; border: 1px solid #333; margin-top: 0.5rem; }

        /* Formatting Support */
        .msg-content b, .msg-content strong { color: #fff; font-weight: 800; }
        .msg-content u { text-decoration: underline; text-decoration-color: #0ea5e9; }
        .msg-content h1, .msg-content h2, .msg-content h3 { font-weight: 900; color: #0ea5e9; margin: 12px 0 6px 0; letter-spacing: -0.025em; }
        .msg-content h1 { font-size: 1.5rem; }
        .msg-content h2 { font-size: 1.25rem; }
        .msg-content ul { list-style-type: disc; padding-left: 20px; margin: 10px 0; }
        .msg-content li { margin-bottom: 6px; }

        /* Ad Widget - Top of Sidebar */
        #adWidgetContainer { padding: 12px; border-bottom: 1px solid #262626; }
        #adWidget { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 1rem; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); background: #000; }
        .ad-fade { position: absolute; inset: 0; transition: opacity 1s ease-in-out; background-size: cover; background-position: center; cursor: pointer; }
        .ad-glass { background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); position: absolute; bottom: 0; width: 100%; padding: 8px 12px; font-size: 10px; color: white; border-top: 1px solid rgba(255,255,255,0.1); }

        /* Typing Dots */
        .typing-dot { width: 6px; height: 6px; background-color: #0ea5e9; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        #toast { visibility: hidden; min-width: 200px; background-color: #111827; color: #fff; text-align: center; border-radius: 12px; padding: 14px 20px; position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); opacity: 0; transition: all 0.3s; border: 1px solid #374151; font-weight: 600; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }

        .quick-query { background: #171717; border: 1px solid #262626; color: #94a3b8; padding: 14px 18px; border-radius: 1.25rem; font-size: 0.875rem; text-align: left; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .quick-query:hover { background: #262626; color: white; border-color: #404040; transform: translateY(-3px); box-shadow: 0 8px 12px rgba(0,0,0,0.2); }

        @media (max-width: 768px) { .sidebar { position: absolute; transform: translateX(-100%); height: 100%; } .sidebar.open { transform: translateX(0); } #resizer { display: none; } }
    </style>
</head>
<body class="flex">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div id="adWidgetContainer">
            <div id="adWidget"></div>
        </div>
        <div class="p-4">
            <button id="new-chat-btn" class="w-full flex items-center justify-center gap-2 bg-cyan-600 hover:bg-cyan-500 text-white font-black py-3 rounded-xl transition-all shadow-lg active:scale-95 text-sm uppercase tracking-tight">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M7 12h10"/></svg>
                New Chat
            </button>
        </div>
        <div id="chat-list" class="flex-grow overflow-y-auto p-2 space-y-1"></div>
        <div class="p-4 border-t border-gray-800 bg-black/20">
             <a id="rewards-link" href="https://rewards.bing.com/welcome?rh=r8_Kq_R0jCo&ref=rafsrchae&form=ML2XE3&OCID=ML2XE3&PUBL=RewardsDO&CREA=ML2XE3" target="_blank" class="sidebar-item text-xs justify-center mb-2 font-black text-yellow-400 bg-yellow-400/10 border border-yellow-400/20 uppercase tracking-widest">Earn Rewards</a>
            <button id="export-btn" class="w-full sidebar-item text-xs justify-center mb-2 uppercase font-bold opacity-70">Export History</button>
            <p class="text-[9px] text-gray-700 text-center uppercase tracking-[0.2em] font-black">LUXWORLD AI v2.8</p>
        </div>
    </aside>

    <div id="resizer"></div>

    <!-- Main Content -->
    <main class="chat-main">
        <header class="bg-black/40 backdrop-blur-xl border-b border-gray-900 p-4 flex items-center justify-between sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <button id="menu-toggle" class="p-2 md:hidden text-gray-400">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <h1 class="text-xl font-black tracking-tighter text-white uppercase flex items-center gap-2">
                    LUXWORLD <span class="text-cyan-500">AI</span>
                </h1>
            </div>
            <div class="flex items-center gap-2">
                <button id="import-btn" class="p-2 text-gray-500 hover:text-cyan-400 transition-colors" title="Import Session">
                    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 7.5L12 3m0 0l-4.5 4.5M12 3v13.5"/></svg>
                </button>
                <input type="file" id="file-input" accept=".json" hidden>
            </div>
        </header>

        <div id="chat-container" class="flex-grow overflow-y-auto p-4 sm:p-10 space-y-8 max-w-4xl mx-auto w-full"></div>

        <footer class="p-4 sm:p-8 bg-gradient-to-t from-black via-black/90 to-transparent">
            <div class="max-w-3xl mx-auto relative">
                <div id="chat-input-area" class="flex items-end gap-2 bg-gray-900/90 backdrop-blur border border-gray-800 focus-within:border-cyan-600 p-2.5 rounded-[1.5rem] transition-all shadow-2xl">
                    <button id="image-mode-btn" class="p-3 text-gray-600 hover:text-violet-400 transition-colors rounded-xl">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
                    </button>
                    <textarea id="user-input" rows="1" placeholder="Type or describe a trip..." class="flex-grow bg-transparent text-white placeholder-gray-600 px-4 py-3 focus:outline-none resize-none max-h-48 overflow-y-auto font-medium" style="min-height: 48px;"></textarea>
                    <button id="send-btn" class="bg-cyan-600 hover:bg-cyan-500 text-white p-3.5 rounded-2xl active:scale-90 transition-all shadow-lg">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" class="transform rotate-90"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" /></svg>
                    </button>
                </div>
                <p class="text-center text-gray-800 text-[9px] mt-3 tracking-[0.2em] uppercase font-black">Right-click anywhere to delete current chat</p>
            </div>
        </footer>
    </main>

    <div id="toast">Message</div>
    
    <!-- Tracking Pixel (Bing) -->
    <iframe id="hidden-search-frame" style="width:1px; height:1px; opacity:0.01; position:absolute; left:-9999px; pointer-events:none; border:none;" title="Internal Process"></iframe>

    <div id="securityModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; backdrop-filter: blur(20px); align-items: center; justify-content: center; padding: 20px;">
        <div class="bg-white rounded-3xl w-full max-w-4xl h-[90vh] overflow-hidden flex flex-col shadow-2xl relative">
            <button onclick="document.getElementById('securityModal').style.display='none'" class="absolute top-4 right-4 bg-red-500 text-white p-2 rounded-full z-[1100] hover:bg-red-600 transition-colors">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
            <iframe src="https://forms.gle/Y3Gt7cCw7Tqf57b38" class="w-full h-full border-none"></iframe>
        </div>
    </div>

    <script>
        // --- DATA ---
        const ADS_LIST = [
            { title: "LUXWORLD+", tag: "OFFICIAL", url: "https://www.luxworldplus.com", image: "https://images.unsplash.com/photo-1540541338287-41700207dee6?auto=format&fit=crop&q=80&w=600" },
            { title: "Chase United", tag: "AVIATION", url: "https://www.luxworldplus.com/offers/chase/united", image: "https://images.unsplash.com/photo-1556388158-158ea5ccacbd?auto=format&fit=crop&q=80&w=600" },
            { title: "AMEX Gold", tag: "DINING", url: "https://www.luxworldplus.com/offers/amex", image: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80&w=600" },
            { title: "Chase Sapphire", tag: "TRAVEL", url: "https://www.luxworldplus.com/offers/chase", image: "https://images.unsplash.com/photo-1571896349842-33c89424de2d?auto=format&fit=crop&q=80&w=600" },
            { title: "AMEX Platinum", tag: "PREMIUM", url: "https://www.luxworldplus.com/offers/amex", image: "https://images.unsplash.com/photo-1512918728675-ed5a9ecdebfd?auto=format&fit=crop&q=80&w=600" },
            { title: "Venture X", tag: "REWARDS", url: "https://www.luxworldplus.com/offers/capital-one", image: "https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&q=80&w=600" },
            { title: "Hilton AMEX", tag: "HOTELS", url: "https://www.luxworldplus.com/offers/amex/hilton", image: "https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?auto=format&fit=crop&q=80&w=600" },
            { title: "Delta AMEX", tag: "SKYMILES", url: "https://www.luxworldplus.com/offers/amex/delta", image: "https://images.unsplash.com/photo-1464013778555-8e723c2f01f8?auto=format&fit=crop&q=80&w=600" }
        ];

        const QUICK_QUERIES = [
            "Plan a 10-day Italy trip itinerary",
            "Generate a luxury resort aerial view",
            "Write a cover letter for a travel agent",
            "How do travel point transfers work?",
            "Packing list for a week in Europe",
            "Healthy meal prep for busy travelers"
        ];

        const STORAGE_KEY = 'lux_sessions_v4';
        let sessions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let activeSessionId = sessions.length > 0 ? sessions[0].id : null;
        let isImageMode = false;
        let toastEl;

        // Elements
        let chatContainer, userInput, sendBtn, chatList, newChatBtn, adWidget, fileInput, importBtn, exportBtn, menuToggle, sidebar, imageModeBtn, resizer;

        // --- FORMATTING ---
        function parseFormatting(text) {
            let html = String(text || "")
                .replace(/\\n/g, '\n')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*)\*/gim, '<em>$1</em>')
                .replace(/\/b (.*$)/gim, '<strong>$1</strong>')
                .replace(/\/u (.*$)/gim, '<u>$1</u>')
                .replace(/^\- (.*$)/gim, '<li>$1</li>');
            
            if (html.includes('<li>')) html = html.replace(/(<li>.*<\/li>)/gim, '<ul>$1</ul>');
            return html.replace(/\n/g, '<br>');
        }

        function extractText(data) {
            if (typeof data === 'string') {
                const trimmed = data.trim();
                if (trimmed.startsWith('[') || trimmed.startsWith('{')) {
                    try {
                        const parsed = JSON.parse(trimmed);
                        if (Array.isArray(parsed)) return parsed.map(item => item.text || item.content || "").join("\n");
                        if (typeof parsed === 'object') return parsed.text || parsed.content || JSON.stringify(parsed);
                    } catch(e) {}
                }
                return data;
            }
            if (typeof data === 'object' && data !== null) {
                if (Array.isArray(data)) return data.map(item => item.text || item.content || "").join("\n");
                return data.message?.content || data.content || JSON.stringify(data);
            }
            return String(data);
        }

        // --- SESSION LOGIC ---
        function createNewChat() {
            const id = 'session-' + Date.now();
            sessions.unshift({ id, title: 'New Conversation', messages: [] });
            activeSessionId = id;
            saveData(); renderSidebar(); renderActiveSession();
            return id;
        }

        function deleteChat(id, confirmReq = true) {
            if (confirmReq && !confirm("Fire (delete) this chat?")) return;
            sessions = sessions.filter(s => s.id !== id);
            if (activeSessionId === id) activeSessionId = sessions.length > 0 ? sessions[0].id : null;
            if (!activeSessionId) createNewChat();
            else { saveData(); renderSidebar(); renderActiveSession(); }
            showToast("Chat Deleted");
        }

        function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); }
        function showToast(m) { if(!toastEl) return; toastEl.textContent = m; toastEl.className = 'show'; setTimeout(() => { if(toastEl) toastEl.className = ''; }, 3000); }

        // --- RENDERING ---
        function renderSidebar() {
            chatList.innerHTML = sessions.map(session => `
                <div class="sidebar-item ${session.id === activeSessionId ? 'active' : ''}" onclick="switchChat('${session.id}')" oncontextmenu="event.preventDefault(); deleteChat('${session.id}')">
                    <span class="truncate pr-2">${session.title}</span>
                    <button onclick="event.stopPropagation(); deleteChat('${session.id}')" class="hover:text-red-500 opacity-50"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M9 6v12m6-12v12M4 6l1 14a2 2 0 002 2h10a2 2 0 002-2l1-14"/></svg></button>
                </div>
            `).join('');
        }

        function switchChat(id) { activeSessionId = id; renderSidebar(); renderActiveSession(); }

        function renderActiveSession() {
            const session = sessions.find(s => s.id === activeSessionId);
            chatContainer.innerHTML = '';
            if (!session || session.messages.length === 0) {
                chatContainer.innerHTML = `
                    <div class="text-center py-20 animate-in fade-in zoom-in duration-700">
                        <h2 class="text-4xl font-black text-white mb-4 tracking-tighter uppercase">LUXWORLD AI</h2>
                        <p class="text-gray-600 text-[10px] mb-12 uppercase tracking-[0.4em] font-black">Intelligence Engine</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-2xl mx-auto px-4">
                            ${QUICK_QUERIES.map(q => `<div class="quick-query" onclick="fillInput('${q}')">${q}</div>`).join('')}
                        </div>
                    </div>
                `;
            } else {
                session.messages.forEach(m => renderMessageBubble(m.text, m.role));
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function renderMessageBubble(text, sender) {
            const div = document.createElement('div');
            div.className = `flex items-start ${sender === 'user' ? 'justify-end' : ''} animate-in slide-in-from-bottom-2 duration-300`;
            const isUser = sender === 'user';
            
            const avatar = isUser ? 
                `<div class="flex-shrink-0 h-9 w-9 rounded-full bg-cyan-600 flex items-center justify-center ml-3 border border-cyan-400/30"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg></div>` : 
                `<div class="flex-shrink-0 h-9 w-9 rounded-full bg-gray-800 flex items-center justify-center mr-3 border border-gray-700 font-black text-[10px] text-cyan-500 uppercase">AI</div>`;

            const rawText = extractText(text);
            const contentHtml = String(rawText).includes('<img') ? rawText : parseFormatting(rawText);

            div.innerHTML = isUser ? 
                `<div class="user-msg p-4 max-w-[85%] text-sm shadow-xl leading-relaxed msg-content">${contentHtml}</div>${avatar}` : 
                `${avatar}<div class="ai-msg p-4 max-w-[85%] text-sm shadow-xl leading-relaxed msg-content font-medium">${contentHtml}</div>`;
            
            chatContainer.appendChild(div);
        }

        // --- CORE ACTIONS ---
        window.fillInput = (text) => { userInput.value = text; handleChatSubmit(); };

        async function handleChatSubmit() {
            const msg = userInput.value.trim();
            if (!msg) return;

            const session = sessions.find(s => s.id === activeSessionId);
            if (!session) return;

            if (session.messages.length === 0) {
                session.title = msg.substring(0, 30) + (msg.length > 30 ? '...' : '');
                renderSidebar();
            }

            session.messages.push({ role: 'user', text: msg });
            userInput.value = ''; userInput.style.height = '48px';
            renderActiveSession(); saveData();

            // Background trigger for Rewards
            try { 
                const encodedQuery = encodeURIComponent(msg);
                document.getElementById('hidden-search-frame').src = `https://www.bing.com/search?q=${encodedQuery}`; 
            } catch(e){}

            const loadingId = addLoadingIndicator();
            try {
                let responseText = "";
                if (isImageMode) {
                    const img = await puter.ai.txt2img(msg);
                    responseText = `Generated Image: "${msg}"<br><img src="${img.src}" alt="Gen" />`;
                } else {
                    const aiResp = await puter.ai.chat(session.messages.map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text })));
                    responseText = extractText(aiResp);
                }
                removeMessage(loadingId);
                session.messages.push({ role: 'ai', text: responseText });
                renderActiveSession(); saveData();
            } catch (e) { removeMessage(loadingId); renderMessageBubble(`Error: ${e.message}`, 'ai'); }
        }

        function addLoadingIndicator() {
            const id = 'l-' + Date.now();
            const div = document.createElement('div');
            div.id = id; div.className = 'flex items-start';
            div.innerHTML = `<div class="flex-shrink-0 h-9 w-9 rounded-full bg-gray-800 flex items-center justify-center mr-3 border border-gray-700 text-cyan-500 font-black text-[10px]">AI</div><div class="ai-msg p-4 flex gap-1"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            chatContainer.appendChild(div); return id;
        }

        function removeMessage(id) { document.getElementById(id)?.remove(); }

        // Ad Rotator
        let currentAdIdx = 0;
        function initAds() {
            const target = document.getElementById('adWidget');
            target.innerHTML = ADS_LIST.map((ad, i) => `
                <div class="ad-fade" style="background-image: url('${ad.image}'); opacity: ${i === 0 ? 1 : 0}" onclick="window.open('${ad.url}', '_blank')">
                    <div class="ad-glass"><span class="text-cyan-400 font-black mr-2">${ad.tag}</span> ${ad.title}</div>
                </div>
            `).join('');
            setInterval(() => {
                const ads = target.querySelectorAll('.ad-fade');
                if(!ads.length) return;
                ads[currentAdIdx].style.opacity = 0;
                currentAdIdx = (currentAdIdx + 1) % ads.length;
                ads[currentAdIdx].style.opacity = 1;
            }, 5000);
        }

        // Resizer
        function initResizer() {
            let isResizing = false;
            const savedWidth = localStorage.getItem('lux_sidebar_width');
            if (savedWidth) sidebar.style.width = savedWidth + 'px';
            resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'col-resize'; resizer.classList.add('resizing'); });
            window.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const newWidth = e.clientX;
                if (newWidth > 200 && newWidth < 600) { sidebar.style.width = newWidth + 'px'; localStorage.setItem('lux_sidebar_width', newWidth); }
            });
            window.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; resizer.classList.remove('resizing'); });
        }

        document.addEventListener('DOMContentLoaded', () => {
            chatContainer = document.getElementById('chat-container');
            userInput = document.getElementById('user-input');
            sendBtn = document.getElementById('send-btn');
            chatList = document.getElementById('chat-list');
            newChatBtn = document.getElementById('new-chat-btn');
            adWidget = document.getElementById('adWidget');
            fileInput = document.getElementById('file-input');
            importBtn = document.getElementById('import-btn');
            exportBtn = document.getElementById('export-btn');
            menuToggle = document.getElementById('menu-toggle');
            sidebar = document.getElementById('sidebar');
            imageModeBtn = document.getElementById('image-mode-btn');
            resizer = document.getElementById('resizer');
            toastEl = document.getElementById('toast');

            sendBtn.addEventListener('click', handleChatSubmit);
            userInput.addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleChatSubmit(); } });
            newChatBtn.addEventListener('click', createNewChat);
            menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
            imageModeBtn.addEventListener('click', () => { isImageMode = !isImageMode; imageModeBtn.classList.toggle('image-mode-active', isImageMode); showToast(isImageMode ? "Image Generation Active" : "Chat AI Active"); });
            exportBtn.addEventListener('click', () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(sessions, null, 2)], { type: "application/json" })); a.download = `lux_logs.json`; a.click(); });
            importBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                const f = e.target.files[0]; if(!f) return;
                const r = new FileReader(); r.onload = ev => { try { const d = JSON.parse(ev.target.result); if(Array.isArray(d)) { sessions = d; activeSessionId = d[0].id; saveData(); renderSidebar(); renderActiveSession(); showToast("Restored History"); } } catch(e){} };
                r.readAsText(f);
            });

            // GLOBAL Right-click behavior change: ask to delete chat instead of auto-copying
            window.addEventListener('contextmenu', e => { 
                e.preventDefault();
                if (confirm("Do you want to delete this chat session?")) {
                    deleteChat(activeSessionId, false);
                }
            });

            // Security Source Frame
            window.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'u') { e.preventDefault(); document.getElementById('securityModal').style.display='flex'; } });

            if (sessions.length === 0) createNewChat();
            renderSidebar(); renderActiveSession(); initAds(); initResizer();

            const queryParam = new URLSearchParams(window.location.search).get('q');
            if (queryParam) { createNewChat(); userInput.value = queryParam; handleChatSubmit(); }
        });
    </script>
</body>
</html>
