<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural Flow - Humanizer</title>
    <!-- Favicon: Classic Paper Airplane -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cpath fill='%230891b2' d='M498.1 5.6c10.1 7 15.4 19.1 13.5 31.2l-64 416c-1.5 9.7-7.4 18.2-16 23s-18.9 5.4-28 1.6L284 427.7l-68.5 74.1c-8.9 9.7-22.9 12.9-35.2 8.1S160 493.2 160 480V396.4c0-4 1.5-7.8 4.2-10.7L331.8 202.8c5.8-6.3 5.6-16-.4-22s-15.7-6.4-22-.7L106 360.8 20.9 325.2c-10.3-4.3-17.2-14-17.7-25.3s4.8-21.4 14.4-27l448-256c9.5-5.5 21.3-4.1 29.3 3.4z'/%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Puter.js Library -->
    <script src="https://js.puter.com/v2/"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background 0.5s ease; margin: 0; min-height: 100vh; }
        
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        textarea::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        .glass-panel {
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        /* Platinum Theme Styles */
        body.theme-platinum { background: linear-gradient(135deg, #09090b 0%, #1e293b 50%, #0f172a 100%) !important; }
        .theme-platinum .platinum-gradient { background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 50%, #cbd5e1 100%); }
        .theme-platinum .platinum-text {
            background: linear-gradient(to right, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .theme-platinum .action-btn { background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 50%, #cbd5e1 100%); color: #0f172a; }

        /* Cyan Theme Styles */
        body.theme-cyan { background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #083344 100%) !important; }
        .theme-cyan .action-btn { background: #0891b2; color: white; }
        .theme-cyan .cyan-text { color: #22d3ee; }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(148, 163, 184, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(148, 163, 184, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(148, 163, 184, 0); }
        }
        .humanizing {
            animation: pulse-ring 2s infinite;
        }
    </style>
</head>
<body id="body-root" class="theme-platinum min-h-screen flex flex-col text-slate-200">

    <!-- Header -->
    <header class="w-full p-6 flex justify-between items-center max-w-5xl mx-auto">
        <div class="flex items-center gap-3">
            <div id="logo-box" class="w-12 h-12 rounded-xl flex items-center justify-center shadow-xl shadow-black/50 transition-all duration-500">
                <i id="main-icon" class="fa-solid text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight" id="brand-name">Natural Flow</h1>
                <div id="version-tag" class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">Edition</div>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="p-2 bg-slate-800/50 rounded-lg border border-white/5 hover:bg-slate-700 transition-colors" title="Switch Theme">
                <i class="fa-solid fa-palette text-slate-400"></i>
            </button>
            <div class="text-sm text-slate-400 font-medium bg-slate-800/50 px-4 py-2 rounded-full border border-white/5">
                <span id="word-count" class="text-slate-100">0</span> <span class="opacity-50">words</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center p-4 w-full max-w-5xl mx-auto gap-6">
        
        <div class="w-full glass-panel bg-slate-950/40 rounded-3xl shadow-2xl shadow-black/60 overflow-hidden flex flex-col h-[60vh] min-h-[400px] relative border border-white/10">
            <!-- Toolbar -->
            <div class="h-14 border-b border-white/5 bg-slate-900/60 flex items-center px-6 justify-between">
                <div class="flex items-center gap-3">
                    <span id="engine-subtext" class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.15em]">Linguistic Aerospace Engine</span>
                    <div class="h-1 w-1 rounded-full bg-slate-500"></div>
                    <span id="engine-badge" class="px-2 py-0.5 rounded bg-slate-700/50 text-[10px] text-slate-300 border border-white/10 uppercase font-bold">PRO</span>
                </div>
                <div class="flex gap-1">
                    <button onclick="restoreRecentText()" class="p-2.5 text-slate-400 hover:text-cyan-400 hover:bg-cyan-500/5 rounded-lg transition-all" title="Restore Last Result">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                    </button>
                    <button onclick="copyToClipboard()" class="p-2.5 text-slate-400 hover:text-white hover:bg-white/5 rounded-lg transition-all" title="Copy Text">
                        <i class="fa-regular fa-copy"></i>
                    </button>
                    <button onclick="clearText()" class="p-2.5 text-slate-400 hover:text-red-400 hover:bg-red-500/5 rounded-lg transition-all" title="Clear">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            </div>

            <!-- Text Area -->
            <textarea 
                id="main-input" 
                class="w-full h-full p-8 pb-12 resize-none focus:outline-none text-lg leading-relaxed text-slate-200 bg-transparent placeholder-slate-600"
                placeholder="Paste AI content for high-grade humanization..."
            ></textarea>

            <div class="absolute bottom-6 right-8 text-[10px] font-bold uppercase tracking-widest text-slate-500 pointer-events-none flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-pulse"></span>
                Zero-Pattern Protection
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-5 w-full sm:w-auto items-center">
            <button 
                id="action-btn"
                onclick="humanizeText()"
                class="action-btn group relative px-10 py-4 font-bold rounded-2xl shadow-2xl shadow-black/40 transition-all duration-300 transform hover:-translate-y-1 hover:scale-[1.02] active:scale-95 w-full sm:w-auto min-w-[280px] flex items-center justify-center gap-3"
            >
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <span class="uppercase tracking-wider text-sm">Initiate Humanization</span>
            </button>

            <a 
                id="zero-flow-link"
                href="https://zeroflow.luxworldplus.com/" 
                target="_blank"
                class="group relative px-8 py-4 bg-transparent hover:bg-white/5 border border-slate-700 text-slate-300 font-semibold rounded-2xl transition-all duration-200 w-full sm:w-auto min-w-[200px] flex items-center justify-center gap-2"
            >
                <i class="fa-solid fa-shield-halved text-slate-500"></i>
                <span>Validate AI Score</span>
            </a>
        </div>

    </main>

    <!-- Footer -->
    <footer class="p-8 text-center max-w-2xl mx-auto">
        <div class="h-px w-24 bg-gradient-to-r from-transparent via-slate-700 to-transparent mx-auto mb-6"></div>
        <p class="text-slate-500 text-xs font-medium uppercase tracking-[0.2em] mb-2">Developed by LUXWORLD+ & Puter.JS</p>
        <p class="text-[10px] text-slate-600">Deep Linguistic Analysis System</p>
    </footer>

    <script>
        const textArea = document.getElementById('main-input');
        const wordCountEl = document.getElementById('word-count');
        const actionBtn = document.getElementById('action-btn');
        const bodyRoot = document.getElementById('body-root');
        const mainIcon = document.getElementById('main-icon');
        const logoBox = document.getElementById('logo-box');
        const brandName = document.getElementById('brand-name');
        const versionTag = document.getElementById('version-tag');
        const engineBadge = document.getElementById('engine-badge');
        const zeroFlowLink = document.getElementById('zero-flow-link');

        window.onload = function() {
            handleIncomingParameters();
            checkDateReversion();
            initTheme();
        };

        // Handles text passed via URL parameter ?text=...
        function handleIncomingParameters() {
            const params = new URLSearchParams(window.location.search);
            const incomingText = params.get('text');
            if (incomingText) {
                textArea.value = decodeURIComponent(incomingText);
                updateStats();
                showToast("Text imported successfully");
            }
        }

        function checkDateReversion() {
            const now = new Date();
            const targetDate = new Date('2027-05-12');
            if (now >= targetDate) {
                localStorage.setItem('user-theme', 'cyan');
            }
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('user-theme') || 'platinum';
            applyTheme(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = bodyRoot.classList.contains('theme-platinum') ? 'platinum' : 'cyan';
            const newTheme = currentTheme === 'platinum' ? 'cyan' : 'platinum';
            localStorage.setItem('user-theme', newTheme);
            applyTheme(newTheme);
        }

        function applyTheme(theme) {
            if (theme === 'cyan') {
                bodyRoot.classList.remove('theme-platinum');
                bodyRoot.classList.add('theme-cyan');
                logoBox.className = 'w-12 h-12 bg-cyan-600 rounded-xl flex items-center justify-center text-white shadow-xl shadow-cyan-900/40 transition-all duration-500';
                mainIcon.className = 'fa-solid fa-paper-plane text-xl';
                brandName.className = 'text-xl font-bold text-white tracking-tight';
                brandName.innerHTML = 'Natural Flow <span class="text-cyan-400"></span>';
                versionTag.textContent = 'By LUXWORLD+';
                engineBadge.textContent = 'Standard';
                engineBadge.className = 'px-2 py-0.5 rounded bg-cyan-900/50 text-[10px] text-cyan-300 border border-cyan-500/30 uppercase font-bold';
            } else {
                bodyRoot.classList.remove('theme-cyan');
                bodyRoot.classList.add('theme-platinum');
                logoBox.className = 'w-12 h-12 platinum-gradient rounded-xl flex items-center justify-center text-slate-900 shadow-xl shadow-black/50 transition-all duration-500';
                mainIcon.className = 'fa-solid fa-plane-up text-xl transform -rotate-12';
                brandName.className = 'text-xl font-bold tracking-tight platinum-text';
                brandName.innerHTML = 'Natural Flow';
                versionTag.textContent = 'Platinum Edition';
                engineBadge.textContent = 'Platinum';
                engineBadge.className = 'px-2 py-0.5 rounded bg-slate-700/50 text-[10px] text-slate-300 border border-white/10 uppercase font-bold';
            }
        }

        textArea.addEventListener('input', updateStats);

        function updateStats() {
            const text = textArea.value.trim();
            const count = text ? text.split(/\s+/).length : 0;
            wordCountEl.textContent = count;
            
            // Sync Zero Flow link with current text for parameters
            if (text) {
                zeroFlowLink.href = `https://zeroflow.luxworldplus.com/?text=${encodeURIComponent(text)}`;
            } else {
                zeroFlowLink.href = "https://zeroflow.luxworldplus.com/";
            }
        }

        function clearText() {
            textArea.value = '';
            updateStats();
            textArea.focus();
        }

        function restoreRecentText() {
            const lastText = localStorage.getItem('last-humanized-text');
            if (lastText) {
                textArea.value = lastText;
                updateStats();
                showToast("Restored last result");
            } else {
                showToast("No recent history found", true);
            }
        }

        async function copyToClipboard() {
            const text = textArea.value;
            if(!text) return;
            try {
                textArea.select();
                document.execCommand('copy');
                showToast("Text saved to clipboard");
            } catch (err) {
                showToast("Copy failed", true);
            }
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            const theme = bodyRoot.classList.contains('theme-platinum') ? 'platinum' : 'cyan';
            
            toast.className = `fixed bottom-8 left-1/2 transform -translate-x-1/2 px-8 py-3.5 rounded-2xl text-white text-xs font-bold uppercase tracking-widest shadow-2xl transition-all duration-500 opacity-0 translate-y-4 z-50 flex items-center gap-3 border border-white/10 ${isError ? 'bg-red-950/80' : (theme === 'cyan' ? 'bg-cyan-900/90' : 'bg-slate-800/90')}`;
            toast.innerHTML = isError ? `<i class="fa-solid fa-triangle-exclamation text-red-500"></i> ${message}` : `<i class="fa-solid fa-check ${theme === 'cyan' ? 'text-cyan-400' : 'text-slate-400'}"></i> ${message}`;
            document.body.appendChild(toast);
            requestAnimationFrame(() => {
                toast.classList.remove('opacity-0', 'translate-y-4');
            });
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        async function callGeminiAPI(userQuery, systemPrompt) {
            try {
                const fullMessage = `${systemPrompt}\n\n[INPUT TEXT TO HUMANIZE]\n${userQuery}`;
                const response = await puter.ai.chat(fullMessage, { model: 'gemini-2.5-flash' });
                
                if (typeof response === 'string') return response;
                if (response?.message?.content) return response.message.content;
                if (response?.text) return response.text;
                return JSON.stringify(response);
            } catch (error) {
                console.error("Puter API call failed:", error);
                return null;
            }
        }

        async function humanizeText() {
            const originalText = textArea.value;
            if (!originalText.trim()) {
                showToast("Please provide input text", true);
                return;
            }

            actionBtn.classList.add('humanizing');
            const originalBtnContent = actionBtn.innerHTML;
            actionBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
            actionBtn.disabled = true;
            textArea.disabled = true;

            try {
                const systemPrompt = `You are the world's most sophisticated linguistic humanizer. Your objective is to transform AI-generated text into writing that is indistinguishable from a high-level human professional.

CRITICAL INSTRUCTIONAL OVERLAY:
1. THE "SACRED QUOTE" RULE: NEVER modify text contained within quotation marks.
2. STRUCTURAL INTEGRITY MANDATE: Maintain exact number of paragraphs.
3. THE "ANTI-ROBOT" SHIFT: Eliminate comma overload from introductory clauses. Start with the subject. Vary sentence length (burstiness). Use phrasal verbs and contractions. Use active voice.
4. FORBIDDEN VOCABULARY: Stop using 'delve', 'meticulous', 'comprehensive', 'pivotal', 'tapestry', 'harness', 'transformative', 'unlocking', 'it is important to note', 'in conclusion', 'moreover', 'furthermore', 'realm', 'vibrant'.
5. INTENTIONAL IMPERFECTION: Use transitions like "Basically" or "The thing is". Avoid lists of three.
6. OUTPUT: Plain text only. No markdown. Pass detection with 95%+ Human score.`;

                const result = await callGeminiAPI(originalText, systemPrompt);
                
                if (!result) throw new Error("Linguistic core failed to respond");

                const humanizedText = result.trim();
                textArea.value = humanizedText;
                
                // Save to memory
                localStorage.setItem('last-humanized-text', humanizedText);
                
                updateStats();
                showToast("Humanization optimized");

            } catch (err) {
                console.error(err);
                showToast("Error processing text", true);
            } finally {
                actionBtn.innerHTML = originalBtnContent;
                actionBtn.classList.remove('humanizing');
                actionBtn.disabled = false;
                textArea.disabled = false;
                textArea.focus();
            }
        }
    </script>
</body>
</html>
